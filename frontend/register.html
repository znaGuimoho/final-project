{% extends 'base.html' %} {% block head %}
<link rel="stylesheet" href="/frontend/css/register.css"/>
{% endblock %} {% block content %}
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>
<div class="grain"></div>

<div class="signup-container">
  <form method="post" class="form-card">

    <div class="logo-badge">
      <svg viewBox="0 0 24 24">
        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
      </svg>
    </div>

    <h3>Create account</h3>
    <p class="subtitle">Join us — it only takes a moment</p>

   {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}
 

    <div class="input-group">
      <div class="input-row">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" placeholder="Pick a name" />
      </div>
      <div class="input-row">
        <label for="gmail">Email address</label>
        <input type="email" id="gmail" name="gmail" placeholder="hello@example.com" />
      </div>
      <div class="input-row">
        <label for="passw">Password</label>
        <input type="password" id="passw" name="passw" placeholder="••••••••" />
      </div>
      <div class="input-row">
        <label for="pass1">Confirm password</label>
        <input type="password" id="pass1" name="pass1" placeholder="••••••••" />
      </div>
    </div>

    <button type="submit" name="join" value="1" class="submit-button">
      Create account
    </button>

    <p>Already have an account?<a href="#">Sign in</a></p>

  </form>
</div>{% endblock %}
