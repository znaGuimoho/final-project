{% extends 'base.html' %} {% block head %}
<link rel="stylesheet" href="/frontend/css/login.css"/>
{% endblock %} {% block content %}
<div class="bg-scene">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="grain"></div>

<!-- Login -->
<form method="post" action="/login" class="space-y-5">
<div class="login-container">
  <div class="form-card">

    <!-- Logo -->
    <div class="logo-badge">
      <svg viewBox="0 0 24 24">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/>
        <path d="M2 17l10 5 10-5"/>
        <path d="M2 12l10 5 10-5"/>
      </svg>
    </div>

    <h3>Welcome back</h3>
    <p class="subtitle">Sign in to continue your journey</p>

    <!-- Error (demo, hidden by default) -->
    <!-- <div class="error-message">Invalid credentials. Please try again.</div> -->

    <div class="space-y-5">
      <div class="input-group">
        <label for="email">Email address</label>
        <div class="input-icon-wrap">
          <input id="email" class="input-field" name="gmail" value="{{ gmail }}" type="email" placeholder="hello@example.com" />
          <span class="field-icon">✉</span>
        </div>
      </div>

      <div class="input-group">
        <label for="password">Password</label>
        <div class="input-icon-wrap">
          <input id="password" name="passw" value="{{ passw }}" class="input-field" type="password" placeholder="••••••••" />
          <span class="field-icon">🔒</span>
        </div>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>

      <button type="submit" name="login" value="1" class="submit-button">Sign in</button>
    </div>

    <div class="divider"><span>OR</span></div>

    <p class="register-text">Don't have an account?<a href="/register">Create one</a></p>

    <div class="status-row">
      <div class="status-dot"></div>
      <span class="status-text">All systems operational</span>
    </div>

  </div>
</div>
</form>
{% endblock %}
