{% extends 'base.html' %} {% block head %}
<link rel="stylesheet" href="/frontend/css/host.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
{% endblock %}

{% block content %}
<div class="all">
  <div class="hoster_container">

    <h1>Host a Property</h1>

    {% if error %}
    <div class="error-message">{{ error }}</div>
    {% endif %}

    <!-- ── Left: Image upload ── -->
    <section class="upload-section">
      <form id="uploadForm" action="/host" method="POST" enctype="multipart/form-data">

        <div class="upload-area" id="uploadArea">
          <div class="upload-icon">
            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
                 fill="none" stroke="currentColor" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 16 12 12 8 16"/>
              <line x1="12" y1="12" x2="12" y2="21"/>
              <path d="M20.39 18.39A5 5 0 0 0 18 9h-1.26A8 8 0 1 0 3 16.3"/>
            </svg>
          </div>
          <div class="upload-text">Click to upload or drag &amp; drop</div>
          <div class="upload-subtext">PNG, JPG, GIF — up to 10 MB</div>
          <input type="file" id="image" name="image" accept="image/*" multiple required />
        </div>

        <div class="preview-container" id="previewContainer">
          <img id="previewImage" class="preview-image" alt="Preview" />
          <div class="success-message" id="successMessage" style="display:none">
            <svg class="checkmark" viewBox="0 0 24 24">
              <polyline points="20 6 9 17 4 12"
                        stroke-dasharray="22" stroke-dashoffset="22" />
            </svg>
            Image ready to upload
          </div>
        </div>

        <button type="submit" class="btn" id="submitBtn" disabled>
          Publish Listing
        </button>

      </form>
    </section>

    <!-- ── Right: Property info ── -->
    <section class="info-section">

      <label for="category">Category</label>
      <select id="category" name="category" required>
        <option value="" disabled selected>Select a type…</option>
        <option value="hotel">Hotel</option>
        <option value="house">House</option>
        <option value="hostel">Hostel</option>
        <option value="white_house">white house</option>
      </select>

      <label for="price">Price per night</label>
      <input type="number" id="price" name="price" min="0" placeholder="e.g. 89" required />

      <label for="locationText">Address</label>
      <input type="text" id="locationText" name="locationText" placeholder="Type address…" required />

      <label for="details">Description</label>
      <input type="text" id="details" name="details" placeholder="Describe your property…" required />

      <label>Pin on map</label>
      <div id="map"></div>
      <p class="map-instruction">Click the map to set exact coordinates.</p>

      <input type="hidden" id="lat" name="lat" />
      <input type="hidden" id="lng" name="lng" />

    </section>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="/frontend/script/host.js"></script>
{% endblock %}
